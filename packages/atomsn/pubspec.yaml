name: atomsn
description: >-
  AtomSN: brand-neutral, themeable Flutter component library organized by
  atomic design + clean architecture. Wraps the shadcn_ui catalog and ships
  the AtomSN theme as the default preset.
version: 0.1.0
publish_to: none
homepage:

environment:
  sdk: ^3.12.2
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  hugeicons: ^1.1.7
  shadcn_ui:
    git:
      url: https://github.com/UScoreNow/atom-sn-shadcn-fork.git
      # Immutable commit from branch usn/0.54.0-elms-huge (reproducibility and
      # auditability: the branch can move, the SHA cannot).
      ref: 23ab87415af254933b8d760c74719582bf2829a3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  alchemist: ^0.14.0

flutter:
  fonts:
    - family: ElmsSans
      fonts:
        - asset: assets/fonts/elms_sans/ElmsSans-VariableFont.ttf
        - asset: assets/fonts/elms_sans/ElmsSans-Italic-VariableFont.ttf
          style: italic
