name: Deploy demo to GitHub Pages

on:
  push:
    branches: [dev]
  workflow_dispatch:

# Minimal permissions so the deploy uses OIDC against GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancels queued builds if a new one arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/demo
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze

      # Same flags validated in the old deploy_web.sh:
      # --base-href = URL path GitHub Pages serves from, which is the repo slug.
      #   Derived from github.event.repository.name so renaming the repo never
      #   breaks Pages again (no hardcoded slug to keep in sync).
      # --pwa-strategy=none (no service worker, avoids blank screens),
      # --wasm (dart2wasm + skwasm, with automatic fallback to JS/CanvasKit).
      - run: flutter build web --release --base-href "/${{ github.event.repository.name }}/" --pwa-strategy=none --wasm

      # Serves the assets as-is, without going through Jekyll.
      - run: touch build/web/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/demo/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
