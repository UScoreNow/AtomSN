name: Deploy demo to GitHub Pages

on:
  push:
    branches: [dev]
  workflow_dispatch:

# Permisos minimos para que el deploy use OIDC contra GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez; cancela builds en cola si llega uno nuevo.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/demo
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze

      # Mismos flags validados en el antiguo deploy_web.sh:
      # --base-href = nombre (slug) del repo de project pages (/atom-sn/),
      # --pwa-strategy=none (sin service worker, evita pantallas en blanco),
      # --wasm (dart2wasm + skwasm, con fallback automatico a JS/CanvasKit).
      - run: flutter build web --release --base-href "/atom-sn/" --pwa-strategy=none --wasm

      # Sirve los assets tal cual, sin pasar por Jekyll.
      - run: touch build/web/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/demo/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
