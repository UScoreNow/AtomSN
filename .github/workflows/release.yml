name: Release

# Each merge to main (promotion from dev) publishes a Release.
# The version comes from packages/atomsn/pubspec.yaml: it must be bumped in the
# dev -> main PR. If the tag v<version> already exists, the Release is skipped without failing.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version from pubspec
        id: ver
        run: echo "version=$(grep '^version:' packages/atomsn/pubspec.yaml | cut -d' ' -f2 | tr -d '\r')" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v${{ steps.ver.outputs.version }} already exists; skipping the Release. Bump version in packages/atomsn/pubspec.yaml in the next PR."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        run: gh release create "v${{ steps.ver.outputs.version }}" --target "$GITHUB_SHA" --title "v${{ steps.ver.outputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
