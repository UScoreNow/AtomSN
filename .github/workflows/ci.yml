name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

# Quality gate: resolves dependencies and runs the analyzer on both packages.
# The demo depends on the library by path, so a change in packages/atomsn
# that breaks the API is caught here before deploying.
jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [packages/atomsn, apps/demo]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
