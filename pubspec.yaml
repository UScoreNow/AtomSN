name: atomic_ui
description: >-
  Biblioteca de componentes Flutter brand-neutral y themeable, organizada por
  atomic design + clean architecture. Envuelve el catalogo de shadcn_ui e incluye
  el tema editorial 'newsprint' como preset por defecto.
version: 0.0.1
publish_to: none
homepage:

environment:
  sdk: ^3.12.2
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  hugeicons: ^1.1.7
  shadcn_ui:
    git:
      url: https://github.com/UScoreNow/flutter-shadcn-ui.git
      # Commit inmutable de la rama usn/0.54.0-elms-huge (reproducibilidad y
      # auditoria: el branch puede moverse, el SHA no).
      ref: e1a6193fdcc0be7244e0b89b6adf05cdc5dee837

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  alchemist: ^0.14.0

flutter:
  fonts:
    - family: ElmsSans
      fonts:
        - asset: assets/fonts/elms_sans/ElmsSans-VariableFont.ttf
        - asset: assets/fonts/elms_sans/ElmsSans-Italic-VariableFont.ttf
          style: italic
